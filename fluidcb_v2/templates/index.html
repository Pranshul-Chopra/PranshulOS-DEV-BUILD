<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLUIDCB</title>
  <link rel="stylesheet" href="/static/fonts/ibmflex.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0c0c0c;
      --surface:    #141414;
      --surface2:   #1c1c1c;
      --border:     #272727;
      --border2:    #333;
      --text:       #e8e6e1;
      --text-2:     #8a8880;
      --text-3:     #4a4845;
      --amber:      #e8a84c;
      --amber-dim:  #7a5820;
      --amber-glow: rgba(232,168,76,0.08);
      --user-bg:    #1e1e1e;
      --radius:     14px;
      --mono:       'IBM Plex Mono', monospace;
      --sans:       'IBM Plex Sans', sans-serif;

      /* personality state colours removed */
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: relative;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--amber);
      flex-shrink: 0;
    }

    .header-sep {
      width: 1px;
      height: 18px;
      background: var(--border2);
      flex-shrink: 0;
    }

    .model-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    /* personality UI removed */

    /* personality legend styles removed */

    /* status line below header */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #4cbb7a;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(76,187,122,0.15);
      flex-shrink: 0;
    }

    .status-text {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    .mode-pill {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--amber);
      background: var(--amber-glow);
      border: 1px solid var(--amber-dim);
      padding: 3px 9px;
      border-radius: 100px;
      letter-spacing: 0.06em;
      display: none;
    }

    .mode-pill.visible { display: block; }

    /* ── messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .row {
      display: flex;
      gap: 12px;
      max-width: 90%;
      animation: fadein 0.16s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .row.bot  { align-self: flex-start; }
    .row.user { align-self: flex-end; flex-direction: row-reverse; }

    /* role glyph */
    .glyph {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      border-radius: 5px;
      margin-top: 3px;
    }

    .bot .glyph  { background: var(--amber-glow); color: var(--amber); border: 1px solid var(--amber-dim); }
    .user .glyph { background: var(--surface2); color: var(--text-3); border: 1px solid var(--border2); }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .bot .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: 3px;
      color: var(--text);
    }

    .user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--border2);
      border-top-right-radius: 3px;
      color: var(--text);
    }

    /* code blocks inside bubbles */
    .bubble pre {
      background: #0a0a0a;
      border: 1px solid var(--border2);
      border-left: 2px solid var(--amber-dim);
      border-radius: 8px;
      padding: 14px 16px;
      margin: 10px 0;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.65;
      color: #d4d0c8;
    }

    /* inline code */
    .bubble code {
      font-family: var(--mono);
      font-size: 12.5px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--amber);
    }

    .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
    }

    /* status pill (tool results) */
    .event-pill {
      align-self: center;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text-2);
      font-size: 11px;
      font-family: var(--mono);
      padding: 5px 13px;
      border-radius: 100px;
      animation: fadein 0.2s ease;
      letter-spacing: 0.03em;
    }

    .event-pill::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--amber);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--amber);
    }

    /* thinking */
    .thinking-row {
      display: flex;
      gap: 12px;
      align-self: flex-start;
      animation: fadein 0.16s ease;
    }

    .thinking-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 15px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 3px;
    }

    .thinking-bubble span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    .dots { display: flex; gap: 4px; }
    .dots i {
      width: 4px; height: 4px;
      background: var(--text-3);
      border-radius: 50%;
      animation: pulse 1.3s infinite ease-in-out;
      list-style: none;
    }
    .dots i:nth-child(2) { animation-delay: 0.18s; }
    .dots i:nth-child(3) { animation-delay: 0.36s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
      40%            { opacity: 1; transform: scale(1); }
    }

    /* ── welcome ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin: auto;
      padding: 48px 24px;
      gap: 0;
    }

    .welcome-mark {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--amber);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .welcome h2 {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .welcome h2 em {
      font-style: normal;
      color: var(--amber);
    }

    .welcome p {
      font-size: 13.5px;
      color: var(--text-2);
      font-weight: 300;
      line-height: 1.7;
      max-width: 340px;
      margin-bottom: 32px;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 420px;
    }

    .chip {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      border: 1px solid var(--border2);
      padding: 6px 14px;
      border-radius: 100px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      letter-spacing: 0.02em;
      background: transparent;
      font-family: var(--mono);
    }

    .chip:hover {
      color: var(--amber);
      border-color: var(--amber-dim);
      background: var(--amber-glow);
    }

    /* ── input area ── */
    .input-area {
      padding: 14px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-row:focus-within {
      border-color: var(--amber-dim);
      box-shadow: 0 0 0 3px rgba(232,168,76,0.06);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
      max-height: 140px;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--text-3); }

    .send-btn {
      width: 32px;
      height: 32px;
      background: var(--amber);
      border: none;
      border-radius: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }

    .send-btn:hover  { opacity: 0.88; }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .send-btn svg { width: 14px; height: 14px; fill: #0c0c0c; }

    .input-meta {
      display: flex;
      align-items: center;
      margin-top: 8px;
      padding: 0 2px;
    }

    .hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    .clear-btn {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.04em;
      padding: 0;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: var(--text-2); }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <span class="logo">FLUIDCB</span>
    <div class="header-sep"></div>
    <span class="model-tag">Qwen3 · local model for a bitch like you</span>

    <!-- personality UI removed to simplify persona handling -->
  </header>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">ready · memory active</span>
    <span class="mode-pill" id="modePill"></span>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-mark">FLUIDCB v2</div>
      <h2>What's on your<br><em>mind?</em></h2>
      <p id="welcomeSubtitle">Ask anything. I remember facts and context across sessions — so every conversation builds on the last.</p>
      <div class="welcome-chips">
            <button class="chip" onclick="prefill('help me understand ')">explain something</button>
            <button class="chip" onclick="prefill('what do you remember about me?')">what do you remember?</button>
            <button class="chip" onclick="prefill('help me study ')">study session</button>
            <button class="chip" onclick="prefill('I want to get better at ')">set a goal</button>
          </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="say something… or /search [query] to search the web" rows="1" autofocus></textarea>
      <button class="send-btn" id="sendBtn" title="Send (Enter)">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-meta">
      <span class="hint">enter to send · shift+enter for newline · /search [query] to search the web</span>
      <button class="clear-btn" id="clearBtn">clear session</button>
    </div>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const welcomeEl  = document.getElementById('welcome');
  const modePill   = document.getElementById('modePill');
  const clearBtn   = document.getElementById('clearBtn');

  // ── On page load: mark model ready, session is always fresh ──────────────
  (() => {
    const statusText = document.getElementById('statusText');
    const statusDot  = document.getElementById('statusDot');
    statusText.textContent = 'model ready · memory active · new session';
    statusDot.style.background = '';
  })();

  // ── textarea auto-resize ───────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  clearBtn.addEventListener('click', async () => {
    if (!confirm('Clear session? This ends the current session and starts a new one.')) return;
    await fetch('/history/clear', { method: 'POST' });
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = 'flex';
    modePill.classList.remove('visible');
    modePill.textContent = '';
  });

  function prefill(text) {
    inputEl.value = text;
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
    inputEl.focus();
    // position cursor at end
    inputEl.selectionStart = inputEl.selectionEnd = text.length;
  }

  // ── rendering ──────────────────────────────────────────────────────────────
  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addBubble(text, role) {
    if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();

    const row    = document.createElement('div');
    row.className = 'row ' + role;

    const glyph  = document.createElement('div');
    glyph.className = 'glyph';
    glyph.textContent = role === 'bot' ? 'AI' : 'ME';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML  = formatMessage(text);

    row.appendChild(glyph);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function addEventPill(text) {
    const pill = document.createElement('div');
    pill.className = 'event-pill';
    pill.textContent = text;
    messagesEl.appendChild(pill);
    scrollBottom();
  }

  function addThinking() {
    if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();
    const row = document.createElement('div');
    row.className = 'thinking-row';
    row.id = 'thinking';

    const glyph = document.createElement('div');
    glyph.className = 'glyph';
    glyph.textContent = 'AI';
    glyph.style.cssText = 'background:var(--amber-glow);color:var(--amber);border:1px solid var(--amber-dim)';

    const bubble = document.createElement('div');
    bubble.className = 'thinking-bubble';
    bubble.innerHTML  = '<div class="dots"><i></i><i></i><i></i></div><span>thinking</span>';

    row.appendChild(glyph);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function removeThinking() {
    const t = document.getElementById('thinking');
    if (t) t.remove();
  }

  function formatMessage(text) {
    // code blocks
    text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) =>
      '<pre><code>' + escHtml(code.trim()) + '</code></pre>'
    );
    // inline code
    text = text.replace(/`([^`]+)`/g, (_, c) => '<code>' + escHtml(c) + '</code>');
    return text;
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ── send ───────────────────────────────────────────────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addBubble(text, 'user');
    addThinking();

    let botBubble = null;
    let rawText   = '';
    let buffer    = '';

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      if (!res.ok) throw new Error('Server error');

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      removeThinking();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);

          if (payload === '[DONE]') {
            break;
          }

          if (payload.startsWith('[ERROR]')) {
            const msg = payload.slice(8);
            if (botBubble) {
              botBubble.innerHTML = formatMessage(msg);
            } else {
              addBubble(msg, 'bot');
            }
            break;
          }

          if (payload.startsWith('[STATUS]')) {
            const statusText = payload.slice(9);
            addEventPill(statusText);
            // update mode pill in status bar if it's a teach/mode status
            if (statusText.includes('Teach') || statusText.includes('Mode')) {
              modePill.textContent = statusText;
              modePill.classList.add('visible');
            }
            continue;
          }

          const token = payload.replace(/\\n/g, '\n');
          rawText += token;

          if (!botBubble) {
            botBubble = addBubble('', 'bot');
          }

          botBubble.innerHTML = formatMessage(rawText);
          scrollBottom();
        }
      }

    } catch (err) {
      removeThinking();
      addBubble('Something went wrong — is Ollama running?', 'bot');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  // End session when app/tab closes — best-effort, multiple events for reliability
  function endSession() {
    try { navigator.sendBeacon('/session/end'); } catch (_) {}
  }
  window.addEventListener('pagehide', endSession);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') endSession();
  });
</script>
</body>
</html>
